        align-items: center !important;
        gap: 16px !important;
        padding: 18px 20px !important;
      }
      .balance-card-wide .card-body {
        display: flex !important;
        flex-direction: column !important;
        gap: 3px !important;
      }
      .balance-card .card-value,
      .balance-card .card-label,
      .balance-card .card-hint,
      .balance-card .card-icon {
        color: white !important;
        opacity: 1 !important;
      }
      /* Balance card - clean subtle border glow, no spinning */
      .balance-card::after {
        content: "" !important;
        position: absolute !important;
        inset: 0 !important;
        border-radius: 20px !important;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.07) 0%,
          transparent 60%
        ) !important;
        pointer-events: none !important;
      }

      .income-card {
        background: linear-gradient(145deg, #ecfdf5, #d1fae5) !important;
        border: 1.5px solid rgba(16, 185, 129, 0.25) !important;
        box-shadow: 0 3px 16px rgba(16, 185, 129, 0.08) !important;
      }
      .expense-card {
        background: linear-gradient(145deg, #fff1f2, #ffe4e6) !important;
        border: 1.5px solid rgba(239, 68, 68, 0.2) !important;
        box-shadow: 0 3px 16px rgba(239, 68, 68, 0.07) !important;
      }
      .salary-card {
        background: linear-gradient(145deg, #fffbeb, #fef3c7) !important;
        border: 1.5px solid rgba(217, 119, 6, 0.25) !important;
        box-shadow: 0 3px 16px rgba(217, 119, 6, 0.08) !important;
      }
      body.dark .income-card {
        background: linear-gradient(145deg, #042e1e, #075c3a) !important;
        border: 1.5px solid rgba(52, 211, 153, 0.28) !important;
        box-shadow: 0 3px 18px rgba(5, 150, 105, 0.18) !important;
      }
      body.dark .expense-card {
        background: linear-gradient(145deg, #2a0c0c, #3d1212) !important;
        border: 1.5px solid rgba(248, 113, 113, 0.28) !important;
        box-shadow: 0 3px 18px rgba(220, 38, 38, 0.15) !important;
      }
      body.dark .salary-card {
        background: linear-gradient(145deg, #221800, #332400) !important;
        border: 1.5px solid rgba(201, 168, 76, 0.32) !important;
        box-shadow: 0 3px 18px rgba(200, 149, 42, 0.15) !important;
      }
      body.dark .balance-card {
        background: linear-gradient(145deg, #0d2e1e, #1a4d30) !important;
        border: 1.5px solid rgba(201, 168, 76, 0.45) !important;
        box-shadow: 0 6px 32px rgba(27, 67, 50, 0.55) !important;
      }
      body.dark .summary-card .card-value {
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.4) !important;
      }

      /* ── BALANCE ROWS ── */
      .balance-summary {
        border-radius: 18px !important;
        border: 1.5px solid var(--cream-border) !important;
        overflow: hidden !important;
        margin: 12px 14px 0 !important;
      }
      body.dark .balance-summary {
        border-color: rgba(201, 168, 76, 0.12) !important;
      }

      /* ── OP ITEMS ── */
      .op-item {
        margin: 0 14px 7px !important;
        border-radius: 15px !important;
        border: 1.5px solid var(--cream-border) !important;
        padding: 12px 14px !important;
        transition:
          transform 0.22s var(--sp),
          border-color 0.15s !important;
      }
      .op-item:active {
        transform: scale(0.978) !important;
        border-color: var(--lux-em2) !important;
      }

      /* ── FAB — Centered gold-rimmed pill ── */
      .fab {
        position: fixed !important;
        bottom: 74px !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        z-index: 299 !important;
        height: 52px !important;
        min-width: 148px !important;
        padding: 0 28px !important;
        border-radius: 26px !important;
        background: linear-gradient(
          135deg,
          #2d6a4f 0%,
          #1b4332 100%
        ) !important;
        color: #fff !important;
        border: 1.5px solid rgba(201, 168, 76, 0.5) !important;
        box-shadow:
          0 8px 32px rgba(27, 67, 50, 0.5),
          0 1px 0 rgba(201, 168, 76, 0.3) inset !important;
        display: flex !important;
        align-items: center !important;
        flex-direction: row !important;
        justify-content: center !important;
        gap: 8px !important;
        font-size: 14px !important;
        font-weight: 800 !important;
        transition:
          transform 0.25s var(--sp),
          box-shadow 0.2s !important;
        cursor: pointer !important;
      }
      .fab:active {
        transform: translateX(-50%) scale(0.92) !important;
      }
      .fab .fab-icon {
        font-size: 20px !important;
      }

      /* ── BOTTOM NAV ── */
      .bottom-nav {
        position: fixed !important;
        bottom: 0 !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        width: 100% !important;
        max-width: 680px !important;
        background: rgba(255, 255, 255, 0.92) !important;
        border-top: 1px solid rgba(201, 168, 76, 0.15) !important;
        padding: 4px 8px calc(4px + env(safe-area-inset-bottom, 0px)) !important;
        backdrop-filter: blur(20px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
        box-shadow: 0 -2px 30px rgba(0, 0, 0, 0.08) !important;
        z-index: 300 !important;
        height: 56px !important;
      }
      .nav-label {
        display: none !important;
      }
      body.dark .bottom-nav {
        background: rgba(8, 16, 12, 0.95) !important;
        border-top-color: rgba(201, 168, 76, 0.1) !important;
      }
      .nav-btn {
        border-radius: 12px !important;
        transition: transform 0.2s var(--sp) !important;
      }
      .nav-btn:active {
        transform: scale(0.86) !important;
      }
      .nav-btn.active {
        background: rgba(27, 67, 50, 0.08) !important;
      }
      body.dark .nav-btn.active {
        background: rgba(45, 106, 79, 0.18) !important;
      }
      .nav-btn.active .nav-label {
        display: none !important;
      }
      body.dark .nav-btn.active .nav-label {
        display: none !important;
      }

      /* ── MODALS ── */
      .modal {
        border-radius: 28px 28px 0 0 !important;
        border-top: 1px solid rgba(201, 168, 76, 0.2) !important;
      }
      .modal-handle {
        background: linear-gradient(
          90deg,
          transparent,
          var(--lux-gold),
          transparent
        ) !important;
        opacity: 0.5 !important;
      }
      .modal-overlay {
        backdrop-filter: blur(8px) !important;
        -webkit-backdrop-filter: blur(8px) !important;
      }

      /* ── BUTTONS ── */
      .btn-primary {
        background: linear-gradient(135deg, #2d6a4f, #1b4332) !important;
        border: 1px solid rgba(201, 168, 76, 0.3) !important;
        border-radius: 14px !important;
        box-shadow: 0 4px 20px rgba(27, 67, 50, 0.35) !important;
        transition:
          transform 0.2s var(--sp),
          box-shadow 0.15s !important;
      }
      .btn-primary:active {
        transform: scale(0.94) !important;
      }
      .btn-secondary {
        border-radius: 14px !important;
        transition: transform 0.2s var(--sp) !important;
      }
      .btn-secondary:active {
        transform: scale(0.94) !important;
      }

      /* ── SETTINGS CARDS ── */
      .settings-card {
        border-radius: 18px !important;
        border: 1.5px solid var(--cream-border) !important;
        margin: 0 14px 10px !important;
        overflow: hidden !important;
      }
      body.dark .settings-card {
        border-color: rgba(255, 255, 255, 0.07) !important;
      }

      /* ── NUMPAD ── */
      .quick-numpad,
      body.simple-mode .quick-numpad {
        display: block !important;
      }
      .numpad-btn {
        height: 54px !important;
        border-radius: 14px !important;
        font-size: 20px !important;
        font-weight: 700 !important;
        transition:
          transform 0.18s var(--sp),
          background 0.12s !important;
      }
      .numpad-btn:active {
        transform: scale(0.86) !important;
        background: rgba(45, 106, 79, 0.1) !important;
      }

      /* ── TOAST ── */
      #toast,
      .toast {
        white-space: normal !important;
        word-break: break-word !important;
        max-width: min(300px, calc(100vw - 40px)) !important;
        text-align: center !important;
        line-height: 1.5 !important;
        border-radius: 18px !important;
        font-size: 13px !important;
        border: 1px solid rgba(201, 168, 76, 0.15) !important;
      }

      /* ── ANIMATIONS ── */
      @keyframes revealCard {
        from {
          opacity: 0;
          transform: translateY(14px) scale(0.94);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .summary-card {
        animation: revealCard 0.4s var(--sp) both !important;
      }
      .summary-card:nth-child(1) {
        animation-delay: 0.05s !important;
      }
      .summary-card:nth-child(2) {
        animation-delay: 0.1s !important;
      }
      .summary-card:nth-child(3) {
        animation-delay: 0.14s !important;
      }
      .summary-card:nth-child(4) {
        animation-delay: 0.18s !important;
      }
      .op-item {
        animation: slideUp 0.25s ease both !important;
      }
      .op-item:nth-child(1) {
        animation-delay: 0.02s !important;
      }
      .op-item:nth-child(2) {
        animation-delay: 0.05s !important;
      }
      .op-item:nth-child(3) {
        animation-delay: 0.08s !important;
      }
      .op-item:nth-child(n + 4) {
        animation-delay: 0.11s !important;
      }
      .settings-card {
        animation: slideUp 0.28s ease both !important;
      }
      .settings-card:nth-child(1) {
        animation-delay: 0.04s !important;
      }
      .settings-card:nth-child(2) {
        animation-delay: 0.08s !important;
      }
      .settings-card:nth-child(3) {
        animation-delay: 0.12s !important;
      }
      .settings-card:nth-child(n + 4) {
        animation-delay: 0.16s !important;
      }

      /* ── FLOATING BTNS ── */
      #voiceInputBtn {
        bottom: 132px !important;
        right: 14px !important;
        position: fixed !important;
        z-index: 200 !important;
      }
      #goalsNavBtn {
        bottom: 132px !important;
        left: 14px !important;
        position: fixed !important;
        z-index: 200 !important;
      }

      /* ── OFFLINE INDICATOR ── */
      #offlineBar {
        position: fixed !important;
        top: 60px !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        z-index: 9999 !important;
        background: #c13515 !important;
        color: #fff !important;
        font-size: 12px !important;
        font-weight: 700 !important;
        padding: 5px 18px !important;
        border-radius: 0 0 12px 12px !important;
        display: none !important;
        align-items: center !important;
        gap: 6px !important;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25) !important;
        animation: slideDown 0.3s ease !important;
      }
      #offlineBar.visible {
        display: flex !important;
      }
      @keyframes slideDown {
        from {
          transform: translateX(-50%) translateY(-100%);
          opacity: 0;
        }
        to {
          transform: translateX(-50%) translateY(0);
          opacity: 1;
        }
      }
      /* ── BUDGET 80% WARNING ── */
      .budget-bar.warning {
        background: #d4860a !important;
      }
      .budget-warn-label {
        font-size: 11px;
        color: #d4860a;
        font-weight: 700;
        margin-top: 3px;
      }

      /* ── Respect prefers-reduced-motion ── */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        #luxBg {
          display: none !important;
        }
      }

      /* ── Small cards (income/expense/salary) compact for 3-col layout ── */
      .income-card .card-hint,
      .expense-card .card-hint,
      .salary-card .card-hint {
        display: none !important;
      }
      .income-card,
      .expense-card,
      .salary-card {
        padding: 12px 10px 12px !important;
        gap: 8px !important;
      }
      .income-card .card-icon,
      .expense-card .card-icon,
      .salary-card .card-icon {
        font-size: 18px !important;
        margin-top: 2px !important;
      }
      .income-card .card-value,
      .expense-card .card-value,
      .salary-card .card-value {
        font-size: clamp(13px, 3.5vw, 17px) !important;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .income-card .card-label,
      .expense-card .card-label,
      .salary-card .card-label {
        font-size: 10px !important;
        white-space: nowrap !important;
        overflow: hidden !important;
        text-overflow: ellipsis !important;
        letter-spacing: 0 !important;
        text-transform: none !important;
      }
    </style>
  </body>
</html>
