<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Мой Бюджет</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Мой Бюджет" />
    <meta name="theme-color" content="#2d6a4f" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="app">
      <!-- ===== ШАПКА ===== -->
      <header class="app-header">
        <div class="header-left">
          <div class="app-logo">🌿 Мой Бюджет</div>
          <div class="header-date" id="headerDate"></div>
        </div>
        <button
          class="theme-toggle"
          id="themeToggle"
          data-i18n-aria="toggleTheme"
          aria-label="Переключить тему"
        >
          🌙
        </button>
      </header>

      <!-- ===== КАРТОЧКИ СВЕРХУ ===== -->
      <div class="top-cards">
        <div
          class="summary-card balance-card"
          data-type="balance"
          role="button"
          tabindex="0"
          data-i18n-aria="ariaBalance"
        >
          <div class="card-icon">💰</div>
          <div class="card-body">
            <div class="card-label" data-i18n="balance">Мой баланс</div>
            <div class="card-value" id="balanceValue">0</div>
            <div class="card-hint" data-i18n="cardHintBalance">
              Сколько у вас сейчас
            </div>
          </div>
        </div>

        <div
          class="summary-card income-card"
          data-type="income"
          role="button"
          tabindex="0"
          data-i18n-aria="ariaIncome"
        >
          <div class="card-icon">📈</div>
          <div class="card-body">
            <div class="card-label" data-i18n="income">Доходы</div>
            <div class="card-value" id="incomeValue">0</div>
            <div class="card-hint" data-i18n="cardHintIncome">
              Всего получено
            </div>
          </div>
        </div>

        <div
          class="summary-card expense-card"
          data-type="expense"
          role="button"
          tabindex="0"
          data-i18n-aria="ariaExpense"
        >
          <div class="card-icon">📉</div>
          <div class="card-body">
            <div class="card-label" data-i18n="expense">Расходы</div>
            <div class="card-value" id="expenseValue">0</div>
            <div class="card-hint" data-i18n="cardHintExpense">
              Всего потрачено
            </div>
          </div>
        </div>

        <div
          class="summary-card salary-card"
          data-type="salary"
          role="button"
          tabindex="0"
          data-i18n-aria="ariaSalary"
        >
          <div class="card-icon">💼</div>
          <div class="card-body">
            <div class="card-label" data-i18n="salary">Начальная сумма</div>
            <div class="card-value" id="salaryValue">0</div>
            <div class="card-hint" data-i18n="cardHintSalary">
              👆 Нажмите чтобы изменить
            </div>
          </div>
        </div>
      </div>

      <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
      <main
        class="main-content"
        id="mainContent"
        role="main"
        aria-live="polite"
        style="margin-bottom: 80px"
      ></main>

      <!-- ===== НИЖНЯЯ НАВИГАЦИЯ ===== -->
      <nav
        class="bottom-nav"
        role="navigation"
        data-i18n-aria="ariaNav"
        aria-label="Основное меню"
      >
        <button
          class="nav-btn"
          data-tab="home"
          data-i18n-aria="ariaNavHome"
          aria-label="Главная страница"
        >
          <span class="nav-icon" aria-hidden="true">🏠</span>
          <span class="nav-label" data-i18n="home">Главная</span>
        </button>
        <button
          class="nav-btn"
          data-tab="stats"
          data-i18n-aria="ariaNavStats"
          aria-label="Статистика"
        >
          <span class="nav-icon" aria-hidden="true">📊</span>
          <span class="nav-label" data-i18n="stats">Статистика</span>
        </button>
        <button
          class="nav-btn"
          data-tab="tools"
          data-i18n-aria="ariaNavTools"
          aria-label="Инструменты"
        >
          <span class="nav-icon" aria-hidden="true">🧮</span>
          <span class="nav-label" data-i18n="tools">Инструменты</span>
        </button>
        <button
          class="nav-btn"
          data-tab="notebook"
          data-i18n-aria="ariaNavNotebook"
          aria-label="Блокнот"
        >
          <span class="nav-icon" aria-hidden="true">📓</span>
          <span class="nav-label" data-i18n="notebook">Блокнот</span>
        </button>
        <button
          class="nav-btn"
          data-tab="categories"
          data-i18n-aria="ariaNavCategories"
          aria-label="Категории"
        >
          <span class="nav-icon" aria-hidden="true">🗂️</span>
          <span class="nav-label" data-i18n="categories">Категории</span>
        </button>
        <button
          class="nav-btn"
          data-tab="settings"
          data-i18n-aria="ariaNavSettings"
          aria-label="Настройки"
        >
          <span class="nav-icon" aria-hidden="true">⚙️</span>
          <span class="nav-label" data-i18n="settings">Настройки</span>
        </button>
      </nav>

      <!-- ===== КНОПКА ДОБАВИТЬ ===== -->
      <button
        class="fab"
        id="fabBtn"
        data-i18n-aria="ariaFab"
        aria-label="Добавить доход или расход"
      >
        <span class="fab-plus" aria-hidden="true">+</span>
        <span class="fab-text">Добавить</span>
      </button>
    </div>

    <!-- ===== УВЕДОМЛЕНИЕ (TOAST) ===== -->
    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <!-- ===== ПОДТВЕРЖДЕНИЕ (вместо alert/confirm) ===== -->
    <div class="confirm-overlay" id="confirmOverlay">
      <div class="confirm-box">
        <div class="confirm-icon" id="confirmIcon">⚠️</div>
        <div class="confirm-title" id="confirmTitle">Вы уверены?</div>
        <div class="confirm-msg" id="confirmMsg"></div>
        <div class="confirm-actions">
          <button class="confirm-cancel" id="confirmCancel">
            ✕ <span data-i18n="cancel">Отмена</span>
          </button>
          <button class="confirm-ok" id="confirmOk">✓ Да, удалить</button>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
    <script>
      if ("serviceWorker" in navigator)
        navigator.serviceWorker.register("sw.js").catch((e) => console.log(e));
    </script>
  </body>
</html>
