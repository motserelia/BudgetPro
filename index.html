<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>My BudgetPro</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="shortcut icon" href="favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Мой Бюджет" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#2d6a4f" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="header-left">
          <div class="app-logo">🌿 Мой Бюджет</div>
          <div class="app-slogan">
            <span class="slogan-icon-left">💰</span>
            <span data-i18n="slogan">Твой капитал — Твои правила</span>
            <span class="slogan-icon-right">💎</span>
          </div>
        </div>
        <div class="header-buttons" style="display: flex; gap: 8px">
          <!-- Кнопка гайда (интерактивный тур) -->
          <button
            class="theme-toggle"
            id="headerGuideBtn"
            aria-label="Запустить гайд"
          >
            🎓
          </button>
          <!-- Кнопка справки (текстовая) -->
          <button class="theme-toggle" id="headerHelpBtn" aria-label="Справка">
            ?
          </button>
          <!-- Кнопка переключения языка -->
          <button class="theme-toggle" id="headerLangBtn" aria-label="Язык">
            🌐
          </button>
          <!-- Кнопка темы -->
          <button
            class="theme-toggle"
            id="themeToggle"
            aria-label="Переключить тему"
          >
            🌙
          </button>
        </div>
      </header>

      <div class="top-cards">
        <div
          class="summary-card balance-card"
          data-type="balance"
          role="button"
          tabindex="0"
        >
          <div class="card-icon">💰</div>
          <div class="card-body">
            <div class="card-label" data-i18n="balance">Мой баланс</div>
            <div class="card-value" id="balanceValue">0</div>
            <div class="card-hint" data-i18n="cardHintBalance">
              Сколько у вас сейчас
            </div>
          </div>
        </div>
        <div
          class="summary-card income-card"
          data-type="income"
          role="button"
          tabindex="0"
        >
          <div class="card-icon">📈</div>
          <div class="card-body">
            <div class="card-label" data-i18n="income">Доходы</div>
            <div class="card-value" id="incomeValue">0</div>
            <div class="card-hint" data-i18n="cardHintIncome">
              Всего получено
            </div>
          </div>
        </div>
        <div
          class="summary-card expense-card"
          data-type="expense"
          role="button"
          tabindex="0"
        >
          <div class="card-icon">📉</div>
          <div class="card-body">
            <div class="card-label" data-i18n="expense">Расходы</div>
            <div class="card-value" id="expenseValue">0</div>
            <div class="card-hint" data-i18n="cardHintExpense">
              Всего потрачено
            </div>
          </div>
        </div>
        <div
          class="summary-card salary-card"
          data-type="salary"
          role="button"
          tabindex="0"
        >
          <div class="card-icon">💼</div>
          <div class="card-body">
            <div class="card-label" data-i18n="salary">Начальная сумма</div>
            <div class="card-value" id="salaryValue">0</div>
            <div class="card-hint" data-i18n="cardHintSalary">
              👆 Нажмите чтобы изменить
            </div>
          </div>
        </div>
      </div>

      <main
        class="main-content"
        id="mainContent"
        role="main"
        aria-live="polite"
        style="margin-bottom: 80px"
      ></main>

      <nav class="bottom-nav" role="navigation" aria-label="Основное меню">
        <button class="nav-btn" data-tab="home" aria-label="Главная">
          <span class="nav-icon">🏠</span>
          <span class="nav-label" data-i18n="home">Главная</span>
        </button>
        <button class="nav-btn" data-tab="stats" aria-label="Статистика">
          <span class="nav-icon">📊</span>
          <span class="nav-label" data-i18n="stats">Статистика</span>
        </button>
        <button class="nav-btn" data-tab="tools" aria-label="Инструменты">
          <span class="nav-icon">🧮</span>
          <span class="nav-label" data-i18n="tools">Инструменты</span>
        </button>
        <button class="nav-btn" data-tab="notebook" aria-label="Блокнот">
          <span class="nav-icon">📓</span>
          <span class="nav-label" data-i18n="notebook">Блокнот</span>
        </button>
        <button class="nav-btn" data-tab="categories" aria-label="Категории">
          <span class="nav-icon">🗂️</span>
          <span class="nav-label" data-i18n="categories">Категории</span>
        </button>
        <button class="nav-btn" data-tab="settings" aria-label="Настройки">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label" data-i18n="settings">Настройки</span>
        </button>
      </nav>

      <button class="fab" id="fabBtn" aria-label="Добавить доход или расход">
        <span class="fab-plus">+</span>
        <span class="fab-text">Добавить</span>
      </button>
    </div>

    <div class="toast" id="toast" role="alert" aria-live="polite"></div>

    <div class="confirm-overlay" id="confirmOverlay">
      <div class="confirm-box">
        <div class="confirm-icon" id="confirmIcon">⚠️</div>
        <div class="confirm-title" id="confirmTitle">Вы уверены?</div>
        <div class="confirm-msg" id="confirmMsg"></div>
        <div class="confirm-actions">
          <button class="confirm-cancel" id="confirmCancel">
            ✕ <span data-i18n="cancel">Отмена</span>
          </button>
          <button class="confirm-ok" id="confirmOk">
            ✓ <span data-i18n="confirmOkBtn">Да, удалить</span>
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <script src="index.js"></script>
    <script>
      if ("serviceWorker" in navigator)
        navigator.serviceWorker.register("sw.js").catch((e) => console.log(e));
    </script>
    <!-- Chart.js для графиков -->
  </body>
</html>
