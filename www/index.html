    <script>
      (function () {
        function bpEarlyLog(msg) {
          try {
            if (
              window.BudgetPROTrace &&
              typeof window.BudgetPROTrace.log === "function"
            ) {
              window.BudgetPROTrace.log("[EARLY] " + msg);
            }
          } catch (e) {}
          try {
            console.log("[EARLY]", msg);
          } catch (e) {}
        }
        window.__bpEarlyLog = bpEarlyLog;
        window.addEventListener("error", function (e) {
          bpEarlyLog(
            "window.error: " +
              (e.message || "unknown") +
              " @ " +
              (e.filename || "") +
              ":" +
              (e.lineno || 0),
          );
        });
        window.addEventListener("unhandledrejection", function (e) {
          bpEarlyLog(
            "unhandledrejection: " +
              (e.reason && e.reason.message
                ? e.reason.message
                : String(e.reason)),
          );
        });
        bpEarlyLog("html-start ua=" + navigator.userAgent);
        bpEarlyLog(
          "bridge=" +
            !!(
              window.BudgetPROTrace &&
              typeof window.BudgetPROTrace.log === "function"
            ),
        );
      })();
    </script>

    <script>
      (function () {
        const ua = navigator.userAgent || "";
        const hasNativeBridge =
          !!window.BudgetPROTrace &&
          typeof window.BudgetPROTrace.log === "function";
        const isNativeLocalhost =
          location.protocol === "https:" &&
          location.hostname === "localhost" &&
          location.port === "";
        const isAndroidWebView =
          hasNativeBridge ||
          isNativeLocalhost ||
          document.documentElement.classList.contains("android-webview") ||
          /\bwv\b/.test(ua) ||
          (/Android/i.test(ua) && /Version\/[\d.]+/i.test(ua));

        if (window.__bpEarlyLog) {
          window.__bpEarlyLog(
            "sw-check isAndroidWebView=" +
              isAndroidWebView +
              " hasNativeBridge=" +
              hasNativeBridge +
              " nativeLocalhost=" +
              isNativeLocalhost +
              " host=" +
              location.host,
          );
        }

        if (isAndroidWebView) {
          window.addEventListener("load", async () => {
            try {
              if ("serviceWorker" in navigator) {
                const regs = await navigator.serviceWorker.getRegistrations();
                await Promise.all(regs.map((reg) => reg.unregister()));
              }
              if ("caches" in window) {
                const keys = await caches.keys();
                await Promise.all(keys.map((key) => caches.delete(key)));
              }
              console.log("[SW] disabled for Android WebView");
            } catch (e) {
              console.warn("[SW cleanup]", e);
            }
          });
          return;
        }

        if (
          "serviceWorker" in navigator &&
          (location.protocol === "https:" ||
            location.hostname === "localhost" ||
            location.hostname === "127.0.0.1")
        )
          window.addEventListener("load", () =>
            navigator.serviceWorker
              .register("sw.js")
              .then((r) => console.log("[SW] OK:", r.scope))
              .catch((e) => console.warn("[SW]", e)),
          );
      })();
    </script>

        }
        to {
          opacity: 1;
        }
      }
      .more-sheet {
        position: fixed !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        z-index: 801 !important;
        border-radius: 24px 24px 0 0 !important;
        padding: 8px 16px 32px !important;
        animation: slideUpSheet 0.32s cubic-bezier(0.34, 1.2, 0.64, 1) !important;
        max-width: 480px !important;
        margin: 0 auto !important;
      }
      /* Add operation sheet follows the same bottom-sheet motion as the More drawer. */
      .more-sheet.add-modal-sheet {
        animation: slideUpSheet 0.44s cubic-bezier(0.22, 1, 0.36, 1) both !important;
      }
      .more-overlay.add-modal-overlay {
        animation: fadeInOverlay 0.28s ease both !important;
      }
      @keyframes slideUpSheet {
        0% {
          transform: translate3d(0, 100%, 0);
        }
        78% {
          transform: translate3d(0, -8px, 0);
        }
        100% {
          transform: translate3d(0, 0, 0);
        }
      }
      @keyframes slideDownSheet {
        0% {
          transform: translate3d(0, 0, 0);
        }
        18% {
          transform: translate3d(0, -4px, 0);
        }
        100% {
          transform: translate3d(0, 104%, 0);
        }
      }
      @keyframes fadeOutOverlay {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }
      .add-modal-host.closing .more-overlay.add-modal-overlay {
        animation: fadeOutOverlay 0.3s ease both !important;
      }
      .add-modal-host.closing .more-sheet.add-modal-sheet {
        animation: slideDownSheet 0.42s cubic-bezier(0.4, 0, 0.2, 1) both !important;
      }
      body.dark .more-sheet {
        background: rgba(12, 6, 34, 0.98) !important;
        border: 1px solid rgba(255, 255, 255, 0.12) !important;
        box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.7) !important;
      }
      body:not(.dark) .more-sheet {
        background: rgba(255, 252, 248, 0.98) !important;
        border: 1px solid rgba(249, 115, 22, 0.15) !important;
        box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.18) !important;
      }
      .more-handle {
        width: 40px !important;
        height: 4px !important;
        border-radius: 99px !important;
        margin: 0 auto 20px !important;
      }
      body.dark .more-handle {
        background: rgba(255, 255, 255, 0.2) !important;
      }
      body:not(.dark) .more-handle {
        background: rgba(0, 0, 0, 0.14) !important;
      }
      .more-grid {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 10px !important;
      }
      .more-item {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        gap: 8px !important;
        padding: 18px 12px !important;
        border-radius: 18px !important;
        cursor: pointer !important;
        border: none !important;
        font-family: inherit !important;
        transition: transform 0.18s cubic-bezier(0.34, 1.4, 0.64, 1) !important;
      }
      body.dark .more-item {
        background: rgba(255, 255, 255, 0.07) !important;
        border: 1px solid rgba(255, 255, 255, 0.11) !important;
      }
      body:not(.dark) .more-item {
        background: rgba(255, 255, 255, 0.75) !important;
        border: 1px solid rgba(0, 0, 0, 0.08) !important;
      }
      .more-item:active {
        transform: scale(0.93) !important;
      }
      .more-item-icon {
        font-size: 28px !important;
        line-height: 1 !important;
      }
      .more-item-lbl {
        font-size: 13px !important;
        font-weight: 700 !important;
      }
      body.dark .more-item-lbl {
        color: #f0eaff !important;
      }
      body:not(.dark) .more-item-lbl {
        color: #111827 !important;
      }

      /* "••••" кнопка в навигации */
      .nav-icon-more {
        font-size: 14px !important;
        letter-spacing: 1px !important;
        font-weight: 900 !important;
      }

      /* ── GLOBAL OVERFLOW FIX ── */
      .main-scroll,
      #mainContent {
        overflow-x: hidden !important;
      }
      .set-card,
      .set-card-body,
      .settings-card,
      .settings-card-body {
        overflow-x: hidden !important;
        max-width: 100% !important;
      }
      .set-themes-row,
      .themes-row {
        max-width: 100% !important;
      }
      .set-themes-wrap {
        overflow-x: hidden !important;
      }
      /* Убираем горизонтальный скролл от длинных строк */
      .set-row-label,
      .set-simple-title,
      .set-section-title {
        word-break: break-word !important;
      }
      .modal,
      .modal-body {
        overflow-x: hidden !important;
        max-width: 100% !important;
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        #luxBg,
        body.dark .nav-fab-circle {
          animation: none !important;
        }
      }

      /* Settings inline text override */
      body:not(.dark) [style*="color:var(--text)"] {
        color: #111827 !important;
      }
      body:not(.dark) [style*="color:var(--text-muted)"] {
        color: #6b7280 !important;
      }
      body.dark [style*="color:var(--text)"] {
        color: #f0eaff !important;
      }
      body.dark [style*="color:var(--text-muted)"] {
        color: rgba(196, 181, 253, 0.6) !important;
      }
      /* Settings row text in light mode */
      body:not(.dark) .settings-card-body [style*="font-weight:700"],
      body:not(.dark) .settings-card [style*="font-size:15px;font-weight:700"],
      body:not(.dark) .settings-card [style*="font-size:14px;font-weight"] {
        color: #111827 !important;
      }
      body.dark .settings-card-body [style*="font-weight:700"],
      body.dark .settings-card [style*="font-size:15px;font-weight:700"] {
        color: #f0eaff !important;
      }
    </style>
  </body>
